# =============================================================================
# Portfolio stack — PRODUCTION setup (this is the default compose file).
#
#   docker compose build        # build backend + web images
#   docker compose up -d        # start db + backend + web
#
# Services, images and containers:
#   db      - image postgres:16-alpine,      container: portfolio-db
#   backend - image portfolio-backend:local, container: portfolio-backend
#   web     - image portfolio-web:local,     container: portfolio-web
#             (nginx serving the built SPA + proxying /api,/uploads to backend)
#
# The reverse proxy (nginx) runs DIRECTLY ON THE HOST, not in Docker — it only
# terminates TLS and proxies everything to the `web` container on
# 127.0.0.1:WEB_HOST_PORT (see deploy/nginx-portfolio.conf and DEPLOY.md).
#
# For local development (Vite dev server, hot reload):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Host requirements: nginx + certbot (deploy/deploy.sh handles both), DNS A
# record, Security Group TCP 80/443 open, and a real .env (see
# .env.production.example).
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: portfolio-backend:local
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-portfolio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars, not the example placeholder)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - uploads:/app/uploads
    # Internal only — the web container reaches it via the compose network.
    depends_on:
      db:
        condition: service_healthy
    # NOTE: depends_on only applies at `compose up` time. The entrypoint also
    # waits for the DB itself, so restarts (reboot, crash loop) are safe too.

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: portfolio-web:local
    container_name: portfolio-web
    restart: unless-stopped
    # Localhost-only: reachable by the host nginx, never from the internet.
    # WEB_HOST_PORT is configurable in case another container on the host
    # already uses 8081 — the deploy scripts render the host nginx config to match.
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-8081}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
