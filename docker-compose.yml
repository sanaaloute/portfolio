services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    # NOTE: in production the port is published on 127.0.0.1 only (see
    # docker-compose.prod.yml) so the host nginx can proxy to it. In dev,
    # docker-compose.dev.yml publishes it on 8000 directly.
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-portfolio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars, not the example placeholder)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
