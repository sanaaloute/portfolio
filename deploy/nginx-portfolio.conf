# Host nginx site config for the portfolio app (runs on the EC2 host, NOT in Docker).
# Complete and ready as-is: HTTP→HTTPS redirect, TLS termination, security headers,
# static SPA from /var/www/portfolio, /api + /uploads proxied to the Docker backend.
#
# First deploy (see DEPLOY.md §6 for the full flow):
#   sudo mkdir -p /var/www/portfolio /var/www/letsencrypt
#
#   Ubuntu/Debian:
#     sudo cp deploy/nginx-portfolio.conf /etc/nginx/sites-available/portfolio
#     sudo ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
#     sudo rm -f /etc/nginx/sites-enabled/default
#   Amazon Linux 2023 (no sites-* dirs; uses conf.d):
#     sudo cp deploy/nginx-portfolio.conf /etc/nginx/conf.d/portfolio.conf
#
#   # One-time certificate bootstrap (nginx must NOT be running yet so certbot
#   # can bind port 80; DNS A record + Security Group 80/443 must be ready):
#   sudo systemctl stop nginx
#   sudo certbot certonly --standalone -d aloutesana.ai-web-builder.com \
#     --non-interactive --agree-tos -m you@example.com
#   sudo nginx -t && sudo systemctl start nginx
#   # Switch renewal to webroot so future renewals work while nginx is running:
#   sudo certbot renew --force-renewal --webroot -w /var/www/letsencrypt
#
# Frontend deploy: build and publish the static files:
#   cd ~/portfolio/frontend && npm ci && npm run build
#   sudo rsync -a --delete dist/ /var/www/portfolio/
#
# NOTE: proxy_pass targets 127.0.0.1:8000 below. If BACKEND_HOST_PORT in .env differs,
# deploy/deploy.sh and deploy/update.sh rewrite the port automatically when installing
# this file — no manual edit needed when using the scripts.

# --- HTTP: Let's Encrypt challenge + redirect everything else to HTTPS ---------
server {
    listen 80;
    server_name aloutesana.ai-web-builder.com;

    # ACME HTTP-01 challenge for certificate issuance/renewal (webroot mode)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: the actual site ----------------------------------------------------
server {
    listen 443 ssl;
    server_name aloutesana.ai-web-builder.com;

    ssl_certificate     /etc/letsencrypt/live/aloutesana.ai-web-builder.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aloutesana.ai-web-builder.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/portfolio;
    index index.html;
    client_max_body_size 55m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers (previously set by Caddy)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # FastAPI backend (compose publishes it on localhost only)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
