# =============================================================================
# Development override (Vite dev server with hot reload, source mounts, dev DB
# port). Base file is the production setup — dev always needs both files:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
#   db:      localhost:5433 -> 5432
#   backend: localhost:8000 -> 8000 (inherited from base, 127.0.0.1 binding)
#   web:     localhost:5173 (Vite, proxies /api and /uploads to backend)
# =============================================================================

services:
  db:
    ports:
      - "5433:5432"

  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/entrypoint.dev.sh:/app/entrypoint.dev.sh
      - uploads:/app/uploads
    entrypoint: ["./entrypoint.dev.sh"]
    command: []
    # ports inherited from base: 127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_TARGET=http://backend:8000
