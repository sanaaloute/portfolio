# =============================================================================
# Development override (Vite dev server with hot reload, source mounts, dev DB
# port). Base file is the production setup — dev always needs both files:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
#   db:      portfolio-db      localhost:5433 -> 5432
#   backend: portfolio-backend localhost:8000 -> 8000
#   web:     portfolio-web-dev localhost:5173 (Vite, proxies /api + /uploads to backend)
# =============================================================================

services:
  db:
    ports:
      - "5433:5432"

  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/entrypoint.dev.sh:/app/entrypoint.dev.sh
      - uploads:/app/uploads
    entrypoint: ["./entrypoint.dev.sh"]
    command: []
    # Base backend has no published ports (internal only) — expose it for dev.
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: portfolio-web:dev
    container_name: portfolio-web-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: !override
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_TARGET=http://backend:8000
