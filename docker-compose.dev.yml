services:
  db:
    ports:
      - "5433:5432"

  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/entrypoint.dev.sh:/app/entrypoint.dev.sh
      - uploads:/app/uploads
    entrypoint: ["./entrypoint.dev.sh"]
    command: []
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
