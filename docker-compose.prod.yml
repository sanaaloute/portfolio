# Production override. Use together with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# The reverse proxy (nginx) runs DIRECTLY ON THE HOST, not in Docker — see
# deploy/nginx-portfolio.conf and DEPLOY.md. It serves the prebuilt frontend
# (/var/www/portfolio) and proxies /api + /uploads to the backend below.
#
# Requirements on the host:
#   - nginx installed (deploy/nginx-portfolio.conf symlinked into sites-enabled).
#     The server_name-based vhost coexists with any other sites on this nginx.
#   - certbot for the Let's Encrypt certificate (see DEPLOY.md §6)
#   - DNS A record for the domain pointing to the EC2 public IP
#   - Security Group inbound: TCP 80 and 443 (0.0.0.0/0). Do NOT open 5432 or 8000.
#   - A real .env in the project root (see .env.production.example) with
#     COOKIE_SECURE=true and CORS_ORIGINS=https://aloutesana.ai-web-builder.com

services:
  # `image` lets the instance PULL a prebuilt image (e.g. from ECR) instead of
  # building locally — recommended for a 1 GB instance. Default builds locally.
  backend:
    image: ${BACKEND_IMAGE:-portfolio-backend:local}
    # Localhost-only: reachable by the host nginx, never from the internet.
    # BACKEND_HOST_PORT is configurable in case another container on the host
    # already uses 8000 — the deploy scripts render the nginx proxy_pass to match.
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
